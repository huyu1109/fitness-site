<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>人体肌肉选择器</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;display:flex;justify-content:center;min-height:100vh;padding:40px 20px}
  .wrap{display:flex;gap:40px;max-width:900px;width:100%;align-items:flex-start}
  .svg-wrap{flex-shrink:0;width:300px;overflow:hidden}
  .svg-wrap svg{width:100%;height:auto;display:block}
  .muscle-part{cursor:pointer;transition:fill 0.2s ease;fill:#8c8c9e;stroke:#e6e6ef;stroke-width:1.5;stroke-linejoin:round}
  .muscle-part:hover{fill:#9e9eb0}
  .muscle-part.selected{fill:#48c972}
  .muscle-part.selected:hover{fill:#3ab862}
  /* 右侧面板 */
  .panel{flex:1;min-width:200px;padding-top:10px}
  .panel h2{font-size:20px;font-weight:700;margin-bottom:4px;color:#222}
  .panel .sub{font-size:13px;color:#888;margin-bottom:16px}
  #selList{min-height:50px;margin-bottom:12px}
  .sel-item{display:flex;justify-content:space-between;align-items:center;padding:7px 12px;margin-bottom:4px;background:#f0f8f0;border:1px solid #c8e6c8;border-radius:8px;font-size:13px;color:#333;animation:fadeIn 0.2s}
  .sel-item .del{cursor:pointer;color:#999;font-size:16px;line-height:1;padding:0 4px}
  .sel-item .del:hover{color:#e74c3c}
  #countText{font-size:13px;color:#999;text-align:center;margin-bottom:12px}
  .quick-btns{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
  .qbtn{padding:6px 16px;border-radius:20px;border:1px solid #ddd;background:#fff;color:#666;font-size:12px;cursor:pointer;transition:all 0.2s;font-family:inherit}
  .qbtn:hover{border-color:#48c972;color:#48c972;background:#f5fff5}
  .empty-state{text-align:center;padding:24px;color:#bbb;font-size:13px}
  @keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
  @media(max-width:700px){
    .wrap{flex-direction:column;align-items:center;gap:20px}
    .svg-wrap{width:260px}
    .panel{width:100%}
  }
</style>
</head>
<body>

<div class="svg-wrap">

<!-- 右侧面板 -->
<div class="panel">
  <h2>肌肉选择器</h2>
  <div class="sub">点击肌肉区域查看详情</div>
  <div id="selList"><div class="empty-state">点击上方肌肉区域</div></div>
  <div id="countText">已选 0 块肌肉</div>
  <div class="quick-btns">
    <button class="qbtn" onclick="qs('push')">推类训练</button>
    <button class="qbtn" onclick="qs('pull')">拉类训练</button>
    <button class="qbtn" onclick="qs('legs')">下肢训练</button>
    <button class="qbtn" onclick="qs('core')">核心训练</button>
    <button class="qbtn" onclick="qs('all')">全身训练</button>
    <button class="qbtn" onclick="qs('clear')">清除选择</button>
  </div>
</div>
</div>

<script>
// ====== 肌肉选择交互 ======
var sel = new Set();

// 预设分组
var groups = {
  push: ['左胸肌','右胸肌','左三角肌','右三角肌','左三头肌','右三头肌'],
  pull: ['左背阔肌','右背阔肌','左二头肌','右二头肌','斜方肌','左小臂','右小臂'],
  legs: ['左臀','右臀','左股四头肌','右股四头肌','左腘绳肌','右腘绳肌','左小腿','右小腿'],
  core: ['上腹肌','下腹肌','左侧腹','右侧腹'],
  all: ['斜方肌','左三角肌','右三角肌','左胸肌','右胸肌','左背阔肌','右背阔肌',
        '上腹肌','下腹肌','左侧腹','右侧腹','左二头肌','右二头肌','左三头肌','右三头肌',
        '左小臂','右小臂','左臀','右臀','左股四头肌','右股四头肌','左腘绳肌','右腘绳肌','左小腿','右小腿']
};

document.querySelectorAll('.muscle-part').forEach(function(el) {
  el.addEventListener('click', function() {
    var name = this.getAttribute('data-name');
    if (sel.has(name)) { sel.delete(name); this.classList.remove('selected'); }
    else { sel.add(name); this.classList.add('selected'); }
    render();
  });
});

function render() {
  var list = document.getElementById('selList');
  document.getElementById('countText').textContent = '已选 ' + sel.size + ' 块肌肉';
  if (sel.size === 0) {
    list.innerHTML = '<div class="empty-state">点击上方肌肉区域</div>';
    return;
  }
  var h = '';
  sel.forEach(function(n) {
    h += '<div class="sel-item"><span>' + n + '</span><span class="del" onclick="rm(\'' + n + '\')">&times;</span></div>';
  });
  list.innerHTML = h;
}

function rm(name) {
  sel.delete(name);
  document.querySelectorAll('.muscle-part').forEach(function(el) {
    if (el.getAttribute('data-name') === name) el.classList.remove('selected');
  });
  render();
}

function qs(type) {
  if (type === 'clear') { sel.clear(); document.querySelectorAll('.muscle-part').forEach(function(el) { el.classList.remove('selected'); }); render(); return; }
  sel.clear();
  document.querySelectorAll('.muscle-part').forEach(function(el) { el.classList.remove('selected'); });
  (groups[type] || []).forEach(function(n) {
    sel.add(n);
    document.querySelectorAll('.muscle-part').forEach(function(el) {
      if (el.getAttribute('data-name') === n) el.classList.add('selected');
    });
  });
  render();
}
</script>
</body>
</html>
