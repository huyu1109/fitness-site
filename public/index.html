<script>
async function loadHome() {
  try {
    const user = await api.get('/user');
    const today = new Date().toISOString().slice(0,10);
    const month = today.slice(0,7);
    const checkins = await api.get('/checkins?month=' + month);
    const meals = await api.get('/meals?date=' + today);
    const badges = await api.get('/streaks');

    const totalCheckins = checkins.filter(c => c.training_done || c.diet_done).length;
    let streak = 0;
    const doneDates = checkins.filter(c => c.training_done).map(c => c.date).sort().reverse();
    for (let i = 0; i < doneDates.length; i++) {
      const d = new Date(doneDates[i]);
      const prev = i > 0 ? new Date(doneDates[i-1]) : null;
      if (i === 0) { streak = 1; continue; }
      const diff = Math.round((prev - d) / 86400000);
      if (diff <= 1) streak++; else break;
    }
    const totalCal = meals.reduce((s, m) => s + m.total_calories, 0);

    document.getElementById('statCheckins').textContent = totalCheckins;
    document.getElementById('statStreak').textContent = streak;
    document.getElementById('statCalories').textContent = Math.round(totalCal);
    document.getElementById('statBadges').textContent = badges.length;

    let activityHTML = '';
    if (checkins.length > 0) {
      const recent = checkins.slice(-5).reverse();
      activityHTML = recent.map(c => {
        const status = [];
        if (c.training_done) status.push('训练');
        if (c.diet_done) status.push('饮食');
        if (c.water_ml > 0) status.push('💧' + c.water_ml + 'ml');
        return '<div style="padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.06);font-size:13px;">' +
          '<span style="color:var(--text-tertiary)">' + c.date + '</span> ' +
          status.join(' ') +
          (c.notes ? ' — ' + c.notes : '') + '</div>';
      }).join('');
    } else {
      activityHTML = '<div class="empty-state"><p>还没有打卡记录，去 <a href="calendar.html">进度日历</a> 开始吧！</p></div>';
    }
    document.getElementById('recentActivity').innerHTML = activityHTML;
  } catch(e) {
    document.getElementById('recentActivity').innerHTML = '<div style="color:var(--text-muted)">加载失败，请确保服务器已启动</div>';
  }
}
loadHome();
</script>
