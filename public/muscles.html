.sub{font-size:13px;color:rgba(200,200,200,0.65);margin-bottom:20px}
.layout{display:flex;gap:40px;align-items:flex-start}
.diagrams{display:flex;gap:60px;flex:1;justify-content:center}
.wrap{text-align:center;position:relative}

.sel-item .del:hover{color:#ff5252}
.count-text{font-size:12px;color:rgba(200,200,200,0.65);text-align:center;margin:8px 0 12px}
.qb{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:12px}
.qb button{flex:1;min-width:70px;padding:7px 0;border-radius:14px;border:1px solid rgba(255,255,255,0.12);background:transparent;color:rgba(200,200,200,0.85);font-size:11px;cursor:pointer;font-family:inherit}
.qb button:hover{border-color:#48c972;color:#48c972}
.ab{display:flex;flex-direction:column;gap:8px}
.ab button{width:100%;border-radius:10px;font-family:inherit;cursor:pointer}

.btn-p:hover{background:#3ab862}
.btn-s{height:38px;border:1px solid rgba(255,255,255,0.12);background:transparent;color:rgba(200,200,200,0.75);font-size:12px;transition:all 0.15s}
.btn-s:hover{border-color:rgba(200,200,200,0.5);color:rgba(255,255,255,0.8)}

function syncToCalendar(){

function generatePlan(){
  console.log("生成计划按钮被点击了");
  if(sel.size===0){alert("请先选择肌肉部位");return}
  var matched={};
  sel.forEach(function(id){
    for(var g in matchKeys){
      for(var i=0;i<matchKeys[g].length;i++){
        if(id.toLowerCase().indexOf(matchKeys[g][i])>=0){matched[g]=exDB[g];break}
      }
    }
  });
  var h="<div style='margin-top:16px;padding:12px;background:rgba(72,201,114,0.06);border:1px solid rgba(72,201,114,0.12);border-radius:8px'>";
  h+="<div style='font-size:14px;font-weight:600;margin-bottom:8px'>\U0001F4CB \u8bad\u7ec3\u8ba1\u5212</div>";
  var total=0;
  for(var g in matched){
    matched[g].forEach(function(ex){
      total++;
      h+="<div style='padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.04);font-size:12px'>";
      h+="<span style='font-weight:500'>"+ex+"</span>";
      h+=" <span style='color:rgba(200,200,200,0.65)'>4\u7ec4\u00d710\u6b21 \u4f11\u606f60s</span></div>"
    })
  }
  h+="<div style='text-align:center;padding:8px 0;font-size:12px;color:rgba(72,201,114,0.8)'>\u5171 "+total+" \u4e2a\u52a8\u4f5c</div></div>";
  var old=document.getElementById("planResult");
  if(old)old.remove();
  var d=document.createElement("div");
  d.id="planResult";
  d.innerHTML=h;
  document.querySelector(".ab").parentNode.insertBefore(d,document.querySelector(".ab").nextSibling)
}

function syncToCalendar(){
  console.log("同步按钮被点击了");
  var plan=document.getElementById("planResult");
  if(!plan){alert("\u26A0\uFE0F \u8bf7\u5148\u751f\u6210\u8bad\u7ec3\u8ba1\u5212");return}
  var today=new Date().toISOString().slice(0,10);
  var exercises=[];
  plan.querySelectorAll("div[style*='border-bottom']").forEach(function(el){
    var txt=el.textContent.trim().split("4组")[0].trim();
    exercises.push({name:txt,sets:4,reps:10,rest:60})
  });
  try{
    var all=JSON.parse(localStorage.getItem("workout_plans")||"{}");
    all[today]={date:today,exercises:exercises};
    localStorage.setItem("workout_plans",JSON.stringify(all));
    alert("\u2705 \u5df2\u540c\u6b65\u5230\u6253\u5361\u8868")
  }catch(e){alert("\u4fdd\u5b58\u5931\u8d25: "+e.message)}
}

function getMirrorId(id){
  if(id.endsWith("-left"))return id.slice(0,-5)+"-right";
  if(id.endsWith("-right"))return id.slice(0,-6)+"-left";
  return null;
}
function getIdPrefix(id){return id.replace(/-left$/,"").replace(/-right$/,"")}
function getDisplayName(id){
  var p=getIdPrefix(id);
  for(var key in nameMap){if(p===key||p.startsWith(key))return nameMap[key]}
  return p;
}

function toggleSel(id){
  var mir=getMirrorId(id);
  if(sel.has(id)){sel.delete(id);if(mir)sel.delete(mir)}
  else{sel.add(id);if(mir)sel.add(mir)}
  syncCharts();updateList()
}
function syncCharts(){
  var s={};sel.forEach(function(i){s[i]={intensity:0,selected:true}});
  chartF.update({bodyState:s});chartB.update({bodyState:s})
}
function updateList(){
  var l=document.getElementById("selList"),c=document.getElementById("countText");
  var groups={};sel.forEach(function(i){groups[getDisplayName(i)]=true});
  var cnt=Object.keys(groups).length;
  c.textContent="共 "+cnt+" 块肌肉";
  if(cnt===0){l.innerHTML="<div class='empty-state'>\uD83D\uDC46 点击人体图选择</div>";return}
  var h="";
  Object.keys(groups).forEach(function(n){h+="<div class='sel-item'><span>"+n+"</span><span class='del' onclick=\"rmGroup('"+n+"')\">\u00D7</span></div>"});
  l.innerHTML=h
}
function rmGroup(name){
  var rm=[];
  sel.forEach(function(i){if(getDisplayName(i)===name)rm.push(i)});
  rm.forEach(function(i){sel.delete(i)});
  syncCharts();updateList()
}
function qs(t){
  sel.clear();
  if(t==="clear"){syncCharts();updateList();return}
  var g={push:["Shoulder","Chest"],pull:["Biceps","Trapezius","Forearm","Lats","Rear"],legs:["Quad","Hamstring","Glute","Gastrocnemius","Soleus","Adductor"],core:["Abs","Oblique","Spine","Erector","Quadratus"]};
  var allM=chartF._muscles.concat(chartB._muscles);
  if(t==="all"){allM.forEach(function(m){sel.add(m.id)});syncCharts();updateList();return}
  var k=g[t]||[];
  allM.forEach(function(m){for(var i=0;i<k.length;i++){if(m.name.indexOf(k[i])>=0){sel.add(m.id);break}}});
  syncCharts();updateList()
}
