<script>
async function loadProfile() {
  try {
    const user = await api.get('/user');
    document.getElementById('nickname').value = user.nickname || '';
    document.getElementById('height').value = user.height || 170;
    document.getElementById('weight').value = user.weight || 70;
    document.getElementById('age').value = user.age || 25;
    document.getElementById('gender').value = user.gender || '莽聰?;
    document.getElementById('goal').value = user.goal || '氓垄聻猫聜聦';
    document.getElementById('activityLevel').value = user.activity_level || '盲赂颅莽颅聣';
    document.getElementById('displayName').textContent = user.nickname || '氓聛楼猫潞芦莽聰篓忙聢路';
    document.getElementById('displayGoal').textContent = '莽聸庐忙聽聡茂录? + (user.goal || '氓垄聻猫聜聦');
    document.getElementById('displayCalories').textContent = '忙聨篓猫聧聬忙炉聫忙聴楼莽聝颅茅聡聫茂录? + (user.daily_calories || 2200) + ' kcal';
  } catch(e) { console.error('氓聤聽猫陆陆莽聰篓忙聢路猫碌聞忙聳聶氓陇卤猫麓楼', e); }
}
async function saveProfile() {
  const data = {
    nickname: document.getElementById('nickname').value,
    height: parseFloat(document.getElementById('height').value) || 170,
    weight: parseFloat(document.getElementById('weight').value) || 70,
    age: parseInt(document.getElementById('age').value) || 25,
    gender: document.getElementById('gender').value,
    goal: document.getElementById('goal').value,
    activity_level: document.getElementById('activityLevel').value
  };
  try {
    const user = await api.post('/user', data);
    document.getElementById('displayName').textContent = user.nickname || '氓聛楼猫潞芦莽聰篓忙聢路';
    document.getElementById('displayGoal').textContent = '莽聸庐忙聽聡茂录? + user.goal;
    document.getElementById('displayCalories').textContent = '忙聨篓猫聧聬忙炉聫忙聴楼莽聝颅茅聡聫茂录? + user.daily_calories + ' kcal';
    showToast('猫碌聞忙聳聶氓路虏盲驴聺氓颅聵茂录聛忙聨篓猫聧聬忙炉聫忙聴楼莽聝颅茅聡聫茂录? + user.daily_calories + ' kcal', 'success');
  } catch(e) { showToast('盲驴聺氓颅聵氓陇卤猫麓楼', 'error'); }
}
async function exportData() {
  try {
    const data = await api.get('/export');
    const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'fitness-data-' + new Date().toISOString().slice(0,10) + '.json';
    a.click();
    showToast('忙聲掳忙聧庐氓路虏氓炉录氓聡?, 'success');
  } catch(e) { showToast('氓炉录氓聡潞氓陇卤猫麓楼', 'error'); }
}
function showToast(msg, type) {
  const t = document.createElement('div');
  t.className = 'toast ' + type;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}
loadProfile();
</script>
