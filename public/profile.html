<script>
async function loadProfile() {
  try {
    const user = await api.get('/user');
    document.getElementById('nickname').value = user.nickname || '';
    document.getElementById('height').value = user.height || 170;
    document.getElementById('weight').value = user.weight || 70;
    document.getElementById('age').value = user.age || 25;
    document.getElementById('gender').value = user.gender || 'з”?;
    document.getElementById('goal').value = user.goal || 'еўһиӮҢ';
    document.getElementById('activityLevel').value = user.activity_level || 'дёӯзӯү';
    document.getElementById('displayName').textContent = user.nickname || 'еҒҘиә«з”ЁжҲ·';
    document.getElementById('displayGoal').textContent = 'зӣ®ж Үпј? + (user.goal || 'еўһиӮҢ');
    document.getElementById('displayCalories').textContent = 'жҺЁиҚҗжҜҸж—ҘзғӯйҮҸпј? + (user.daily_calories || 2200) + ' kcal';
  } catch(e) { console.error('еҠ иҪҪз”ЁжҲ·иө„ж–ҷеӨұиҙҘ', e); }
}
async function saveProfile() {
  const data = {
    nickname: document.getElementById('nickname').value,
    height: parseFloat(document.getElementById('height').value) || 170,
    weight: parseFloat(document.getElementById('weight').value) || 70,
    age: parseInt(document.getElementById('age').value) || 25,
    gender: document.getElementById('gender').value,
    goal: document.getElementById('goal').value,
    activity_level: document.getElementById('activityLevel').value
  };
  try {
    const user = await api.post('/user', data);
    document.getElementById('displayName').textContent = user.nickname || 'еҒҘиә«з”ЁжҲ·';
    document.getElementById('displayGoal').textContent = 'зӣ®ж Үпј? + user.goal;
    document.getElementById('displayCalories').textContent = 'жҺЁиҚҗжҜҸж—ҘзғӯйҮҸпј? + user.daily_calories + ' kcal';
    showToast('иө„ж–ҷе·ІдҝқеӯҳпјҒжҺЁиҚҗжҜҸж—ҘзғӯйҮҸпј? + user.daily_calories + ' kcal', 'success');
  } catch(e) { showToast('дҝқеӯҳеӨұиҙҘ', 'error'); }
}
async function exportData() {
  try {
    const data = await api.get('/export');
    const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'fitness-data-' + new Date().toISOString().slice(0,10) + '.json';
    a.click();
    showToast('ж•°жҚ®е·ІеҜјеҮ?, 'success');
  } catch(e) { showToast('еҜјеҮәеӨұиҙҘ', 'error'); }
}
function showToast(msg, type) {
  const t = document.createElement('div');
  t.className = 'toast ' + type;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}
loadProfile();
</script>
