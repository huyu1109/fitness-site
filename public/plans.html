function generatePlan(){if(window.unlockAPI&&!unlockAPI.isUnlocked()){document.getElementById('planResult').innerHTML='<div class="card" style="text-align:center;padding:40px"><p style="font-size:40px;margin-bottom:12px">??</p><h3 style="margin-bottom:8px">训练计划已锁定</h3><p style="color:rgba(255,255,255,0.4);font-size:13px;margin-bottom:16px">解锁后可查看完整训练计划详情</p><button class="btn btn-primary" onclick="unlockAPI.showModal()">0.5元解锁全站</button></div>';return}
  const goal=document.getElementById('planGoal').value,days=parseInt(document.getElementById('planDays').value),equip=document.getElementById('planEquipment').value;
  const pd=EXERCISE_DB[goal]&&EXERCISE_DB[goal][equip];
  if(!pd){document.getElementById('planResult').innerHTML='<div class="card"><p style="color:var(--text-tertiary)">暂无匹配计划，请调整选择条件</p></div>';return}
  const groups=Object.keys(pd),rotations=[];
  for(let w=0;w<4;w++)for(let d=0;d<days;d++){const dg=[];const used=new Set();const tc=groups.length<=2?groups.length:Math.min(3,groups.length);let a=0;while(dg.length<tc&&a<50){const g=groups[Math.floor(Math.random()*groups.length)];if(!used.has(g)){dg.push(g);used.add(g)}a++}if(dg.length===0)dg.push(groups[0]);rotations.push(dg)}
  let html='<h2 class="section-header" style="margin-top:0;">4周训练计划 · '+goal+' · '+equip+' · 每周'+days+'天</h2>';
  for(let w=1;w<=4;w++){html+='<h3 style="margin:20px 0 12px;color:var(--accent);">第'+w+'周</h3>';for(let d=0;d<days;d++){const gs=rotations[(w-1)*days+d];html+='<div class="plan-day"><div class="plan-day-header collapsed" onclick="this.classList.toggle(\'collapsed\');this.nextElementSibling.classList.toggle(\'collapsed\')"><span>第'+w+'周 · 第'+(d+1)+'练</span><span class="arrow">&#9660;</span></div><div class="plan-day-body collapsed"><p style="color:var(--text-tertiary);font-size:13px;margin-bottom:8px;">'+gs.join(' · ')+'</p>';for(const g of gs){(pd[g]||[]).forEach(function(ex){html+='<div class="plan-exercise" onclick="showExDetail(\''+ex.name+'\',\''+ex.sets+'\',\''+(ex.detail||'感受目标肌群发力')+'\')"><div class="name">'+ex.name+'</div><div class="detail"><span>'+ex.sets+'</span>'+(ex.detail?'<span style="color:var(--text-tertiary)">'+ex.detail+'</span>':'')+'</div></div>'})}html+='</div></div>'}}
  html+='<div class="card" style="margin-top:16px;text-align:center;"><p style="color:var(--text-tertiary);font-size:13px;">点击每个动作查看详细训练指导</p></div>';
  document.getElementById('planResult').innerHTML=html
}
function showExDetail(name,sets,detail){
  const o=document.createElement('div');o.className='modal-overlay active exercise-detail-modal';
  o.innerHTML='<div class="modal"><button class="modal-close" onclick="this.closest(\'.modal-overlay\').remove()">&times;</button><h3>'+name+'</h3><div class="detail-section"><h4>推荐组数</h4><p>'+sets+'</p></div><div class="detail-section"><h4>动作要点</h4><p>'+detail+'</p></div><button class="btn btn-primary btn-block" onclick="this.closest(\'.modal-overlay\').remove()" style="margin-top:12px;">知道了</button></div>';
  document.body.appendChild(o);o.addEventListener('click',function(e){if(e.target===this)this.remove()})
}
