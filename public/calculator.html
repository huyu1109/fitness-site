<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>热量计算器 - 铁馆</title>
<meta name="description" content="铁馆热量计算器 - 90种常见食物热量查询，科学管理每日饮食摄入。">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<nav class="nav">
<div class="nav-inner">
<a href="index.html" class="nav-logo">铁馆</a>
<ul class="nav-links">
<li><a href="index.html">首页</a></li>

<script>
(function(){var p=location.pathname.split("/").pop()||"index.html";document.querySelectorAll(".nav-links a").forEach(function(a){if(a.getAttribute("href")===p)a.classList.add("active")})})();
</script>
<script src="js/particles.js"></script>
<div class="container content-enter">
  <h1 class="page-title content-enter">热量计算器</h1>
  <p class="page-subtitle content-enter content-enter-delay-1">搜索食物，记录饮食，科学管理每日热量</p>
  <div class="calc-layout content-enter content-enter-delay-2">
    <div class="card"><div class="card-header">搜索食物</div>
      <input class="food-search" id="foodSearch" placeholder="搜索食物..." oninput="filterFoods()">
      <div class="food-categories" id="foodCats">
        <button class="food-cat active" data-cat="all">全部</button>
        <button class="food-cat" data-cat="主食">主食</button>
        <button class="food-cat" data-cat="肉类">肉类</button>
        <button class="food-cat" data-cat="蔬菜">蔬菜</button>
        <button class="food-cat" data-cat="水果">水果</button>
        <button class="food-cat" data-cat="乳制品">乳制品</button>
        <button class="food-cat" data-cat="坚果">坚果零食</button>
      </div>
      <div class="food-list" id="foodList"></div>
      <button class="btn btn-secondary btn-sm" onclick="showAddFoodModal()" style="margin-top:12px;">+ 添加自定义食物</button>
    </div>
    <div class="card"><div class="card-header">当前餐盘</div>
      <div class="form-group"><label>餐次</label><select class="form-control" id="mealType"><option>早餐</option><option>午餐</option><option>晚餐</option><option>加餐</option></select></div>
      <div id="currentPlate"><div class="empty-state"><p>点击左侧食物添加到餐盘</p></div></div>
      <div class="plate-summary" id="plateSummary">
        <div class="plate-stat"><div class="val" id="sumCal">0</div><div class="lbl">热量</div></div>
        <div class="plate-stat"><div class="val" id="sumProtein">0</div><div class="lbl">蛋白质</div></div>
        <div class="plate-stat"><div class="val" id="sumFat">0</div><div class="lbl">脂肪</div></div>
        <div class="plate-stat"><div class="val" id="sumCarbs">0</div><div class="lbl">碳水</div></div>
      </div>
      <div class="input-group" style="margin-bottom:10px;"><label>份量(g):</label><input type="number" id="portionGrams" value="100" min="10" max="1000" step="10"></div>
      <button class="btn btn-primary btn-block" onclick="saveMeal()">保存这餐</button>
      <button class="btn btn-secondary btn-block" onclick="clearPlate()">清空餐盘</button>
      <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap;">
        <button class="btn btn-secondary btn-sm" onclick="showSaveMealModal()">保存为常用搭配</button>
        <button class="btn btn-secondary btn-sm" onclick="showSavedMeals()">我的常用搭配</button>
      </div>
    </div>
  </div>
  <h3 class="section-header content-enter content-enter-delay-3">今日饮食记录</h3>
  <div class="card content-enter content-enter-delay-3" id="todayMeals"></div>
</div>
<script src="js/unlock.js"></script>
<script src="js/nav.js"></script>
<script src="js/ui.js"></script>
<script src="js/api.js"></script>
<script>
let allFoods=[],currentPlate=[],currentCat='all';
async function loadFoods(){try{allFoods=await api.get('/foods');renderFoods()}catch(e){}}
function renderFoods(){const s=(document.getElementById('foodSearch').value||'').trim().toLowerCase();let f=allFoods;if(currentCat!=='all')f=f.filter(x=>x.category===currentCat);if(s)f=f.filter(x=>x.name.includes(s));
  const g=parseInt(document.getElementById('portionGrams').value)||100;
  document.getElementById('foodList').innerHTML=f.map(x=>'<div class="food-item" onclick="addToPlate('+x.id+','+g+')"><span>'+x.name+'</span><span class="cal">'+x.calories_per100g+' kcal/100g</span></div>').join('');
  if(f.length===0)document.getElementById('foodList').innerHTML='<div class="empty-state"><p>没有找到匹配食物</p></div>'}
function filterFoods(){renderFoods()}
document.getElementById('foodCats').addEventListener('click',function(e){if(e.target.classList.contains('food-cat')){this.querySelectorAll('.food-cat').forEach(t=>t.classList.remove('active'));e.target.classList.add('active');currentCat=e.target.dataset.cat;renderFoods()}});
function addToPlate(fid,g){const f=allFoods.find(x=>x.id===fid);if(!f)return;const r=g/100;currentPlate.push({food:f,grams:g,calories:Math.round(f.calories_per100g*r),protein:Math.round(f.protein*r*10)/10,fat:Math.round(f.fat*r*10)/10,carbs:Math.round(f.carbs*r*10)/10});renderPlate()}
function renderPlate(){const c=document.getElementById('currentPlate');c.innerHTML=currentPlate.length===0?'<div class="empty-state"><p>点击左侧食物添加到餐盘</p></div>':currentPlate.map((i,idx)=>'<div class="plate-dish" style="display:flex;justify-content:space-between;align-items:center;"><span>'+i.food.name+' <span style="color:var(--text-tertiary)">'+i.grams+'g</span></span><span><span style="color:var(--accent);font-weight:600;">'+i.calories+'</span> kcal <span style="cursor:pointer;color:var(--text-tertiary);margin-left:8px;" onclick="removeFromPlate('+idx+')">&#10005;</span></span></div>').join('');
  const sc=currentPlate.reduce((s,i)=>s+i.calories,0),sp=currentPlate.reduce((s,i)=>s+i.protein,0),sf=currentPlate.reduce((s,i)=>s+i.fat,0),scb=currentPlate.reduce((s,i)=>s+i.carbs,0);
  document.getElementById('sumCal').textContent=sc;document.getElementById('sumProtein').textContent=sp.toFixed(1);document.getElementById('sumFat').textContent=sf.toFixed(1);document.getElementById('sumCarbs').textContent=scb.toFixed(1)}
function removeFromPlate(i){currentPlate.splice(i,1);renderPlate()}
function clearPlate(){currentPlate=[];renderPlate()}
async function saveMeal(){if(currentPlate.length===0){showToast('餐盘为空','error');return}
  const mt=document.getElementById('mealType').value,td=new Date().toISOString().slice(0,10);
  const sc=currentPlate.reduce((s,i)=>s+i.calories,0),sp=currentPlate.reduce((s,i)=>s+i.protein,0),sf=currentPlate.reduce((s,i)=>s+i.fat,0),scb=currentPlate.reduce((s,i)=>s+i.carbs,0);
  await api.post('/meal',{date:td,meal_type:mt, foods_json:currentPlate.map(i=>({id:i.food.id,name:i.food.name,grams:i.grams,cal:i.calories})),total_calories:sc,total_protein:sp,total_fat:sf,total_carbs:scb});
  showToast(mt+'已保存','success');clearPlate();loadTodayMeals()}
async function loadTodayMeals(){const td=new Date().toISOString().slice(0,10);try{const ms=await api.get('/meals?date='+td);const c=document.getElementById('todayMeals');if(ms.length===0){c.innerHTML='<div class="empty-state"><p>今天还没有饮食记录</p></div>';return}
  let html='';for(const mt of['早餐','午餐','晚餐','加餐']){const m=ms.filter(x=>x.meal_type===mt);if(m.length===0)continue;html+='<div class="meal-item"><div><strong>'+mt+'</strong>';for(const meal of m){const f=typeof meal.foods_json==='string'?JSON.parse(meal.foods_json):(meal.foods_json||[]);const n=f.map(x=>x.name+(x.grams?'('+x.grams+'g)':'')).join('、');html+='<div style="font-size:12px;color:var(--text-tertiary);">'+n+'</div></div><div><span class="meal-cal">'+Math.round(meal.total_calories)+'</span> kcal <span class="meal-del" onclick="deleteMeal('+meal.id+')">&#10005;</span></div>'}html+='</div>'}
  const tc=ms.reduce((s,m)=>s+m.total_calories,0),tp=ms.reduce((s,m)=>s+(m.total_protein||0),0),tf=ms.reduce((s,m)=>s+(m.total_fat||0),0),tcb=ms.reduce((s,m)=>s+(m.total_carbs||0),0);
  html+='<div class="daily-summary"><div class="row"><span class="lbl">今日总计</span><span class="val">'+Math.round(tc)+' kcal</span></div><div class="row"><span class="lbl">蛋白质</span><span class="val">'+tp.toFixed(1)+'g</span></div><div class="row"><span class="lbl">脂肪</span><span class="val">'+tf.toFixed(1)+'g</span></div><div class="row"><span class="lbl">碳水</span><span class="val">'+tcb.toFixed(1)+'g</span></div></div>';
  c.innerHTML=html}catch(e){}}
async function deleteMeal(id){await api.del('/meal/'+id);showToast('已删除','success');loadTodayMeals()}
function showAddFoodModal(){const o=document.createElement('div');o.className='modal-overlay active';o.innerHTML='<div class="modal"><button class="modal-close" onclick="this.closest(\'.modal-overlay\').remove()">&times;</button><h3>添加自定义食物</h3><div class="form-group"><label>食物名</label><input class="form-control" id="newFoodName" placeholder="如：自制鸡胸肉"></div><div class="form-group"><label>分类</label><select class="form-control" id="newFoodCat"><option>主食</option><option>肉类</option><option>蔬菜</option><option>水果</option><option>乳制品</option><option>坚果</option></select></div><div class="grid-2"><div class="form-group"><label>热量 (kcal/100g)</label><input class="form-control" id="newFoodCal" type="number" step="0.1"></div><div class="form-group"><label>蛋白质 (g/100g)</label><input class="form-control" id="newFoodPro" type="number" step="0.1"></div></div><div class="grid-2"><div class="form-group"><label>脂肪 (g/100g)</label><input class="form-control" id="newFoodFat" type="number" step="0.1"></div><div class="form-group"><label>碳水 (g/100g)</label><input class="form-control" id="newFoodCarb" type="number" step="0.1"></div></div><button class="btn btn-primary btn-block" onclick="addCustomFood()">添加</button></div>';document.body.appendChild(o)}
async function addCustomFood(){const d={name:document.getElementById('newFoodName').value,category:document.getElementById('newFoodCat').value,calories_per100g:parseFloat(document.getElementById('newFoodCal').value)||0,protein:parseFloat(document.getElementById('newFoodPro').value)||0,fat:parseFloat(document.getElementById('newFoodFat').value)||0,carbs:parseFloat(document.getElementById('newFoodCarb').value)||0};if(!d.name){showToast('请输入食物名','error');return}await api.post('/foods',d);document.querySelector('.modal-overlay.active').remove();showToast('食物已添加','success');loadFoods()}
function showSaveMealModal(){if(currentPlate.length===0){showToast('餐盘为空','error');return}const o=document.createElement('div');o.className='modal-overlay active';o.innerHTML='<div class="modal"><button class="modal-close" onclick="this.closest(\'.modal-overlay\').remove()">&times;</button><h3>保存为常用搭配</h3><div class="form-group"><label>搭配名称</label><input class="form-control" id="savedMealName" placeholder="如：增肌早餐"></div><button class="btn btn-primary btn-block" onclick="saveSavedMeal()">保存</button></div>';document.body.appendChild(o)}
async function saveSavedMeal(){const n=document.getElementById('savedMealName').value;if(!n){showToast('请输入名称','error');return}await api.post('/saved-meals',{name:n,foods_json:currentPlate.map(i=>({id:i.food.id,name:i.food.name,grams:i.grams})),total_calories:currentPlate.reduce((s,i)=>s+i.calories,0)});document.querySelector('.modal-overlay.active').remove();showToast('已保存常用搭配','success')}
async function showSavedMeals(){try{const s=await api.get('/saved-meals');const o=document.createElement('div');o.className='modal-overlay active';o.innerHTML='<div class="modal"><button class="modal-close" onclick="this.closest(\'.modal-overlay\').remove()">&times;</button><h3>我的常用搭配</h3>'+(s.length===0?'<p style="color:var(--text-tertiary)">暂无保存的搭配</p>':s.map(x=>'<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.06);"><span>'+x.name+' <span style="color:var(--text-tertiary);font-size:12px;">'+Math.round(x.total_calories)+'kcal</span></span><span><button class="btn btn-sm btn-primary" onclick="loadSavedMeal('+x.id+',\''+x.name+'\')">使用</button></span></div>').join(''))+'</div>';document.body.appendChild(o)}catch(e){}}
async function loadSavedMeal(id){const s=await api.get('/saved-meals');const m=s.find(x=>x.id===id);if(!m)return;const f=typeof m.foods_json==='string'?JSON.parse(m.foods_json):(m.foods_json||[]);currentPlate=[];for(const x of f){const food=allFoods.find(f2=>f2.id===x.id||f2.name===x.name);if(food){const g=x.grams||100;currentPlate.push({food,grams:g,calories:Math.round(food.calories_per100g*g/100),protein:Math.round(food.protein*g/100*10)/10,fat:Math.round(food.fat*g/100*10)/10,carbs:Math.round(food.carbs*g/100*10)/10})}}document.querySelector('.modal-overlay.active').remove();renderPlate();showToast('已加载','success')}
function showToast(msg,t){const e=document.createElement('div');e.className='toast '+t;e.textContent=msg;document.body.appendChild(e);setTimeout(()=>e.remove(),2500)}
loadFoods();loadTodayMeals();
</script>
</body>
</html>
