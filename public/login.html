// QR code functions - ASCII safe
var qtp=null,qet=null,qea=0,qd=null;
function qrLd(){
  var i=document.getElementById('qrCodeImg'),p=document.getElementById('qrPh'),s=document.getElementById('qrStatus'),r=document.getElementById('qrRefreshBtn'),b=document.getElementById('qrSimBtn');
  if(!i)return;
  i.style.display='none';p.style.display='flex';
  s.textContent='\u6B63\u5728\u751F\u6210...';
  r.style.display='none';b.style.display='none';
  if(qtp){clearInterval(qtp);qtp=null;}
  if(qet){clearInterval(qet);qet=null;}
  api.post('/auth/feishu/qrcode').then(function(x){
    qd=x;qea=x.expire_at;i.src=x.qrcode_url;
    i.onload=function(){i.style.display='block';p.style.display='none';};
    i.onerror=function(){p.textContent='\u52A0\u8F7D\u5931\u8D25';};
    s.textContent='\u8BF7\u4F7F\u7528\u98DE\u4E66\u626B\u7801\u767B\u5F55';
    b.style.display='inline-block';
    stP(x.qrcode_id);stT();
  }).catch(function(){s.textContent='\u751F\u6210\u5931\u8D25';r.style.display='block';});
}
function stP(id){
  var s=document.getElementById('qrStatus'),r=document.getElementById('qrRefreshBtn');
  if(qtp)clearInterval(qtp);
  qtp=setInterval(function(){
    api.get('/feishu/status/'+id).then(function(x){
      if(x.status==='scanned'){
        s.textContent='\u5DF2\u626B\u7801\uFF0C\u8BF7\u5728\u624B\u673A\u4E0A\u786E\u8BA4';
        api.post('/auth/feishu/confirm-scan/'+id).then(function(c){
          if(c.status==='confirmed'&&c.token){
            clearInterval(qtp);qtp=null;clearInterval(qet);qet=null;
            localStorage.setItem('fit_token',c.token);localStorage.setItem('fit_user',JSON.stringify(c.user));
            shS('\u767B\u5F55\u6210\u529F','\u6B63\u5728\u8DF3\u8F6C...');
            setTimeout(function(){var rd=localStorage.getItem('fit_redirect')||'index.html';localStorage.removeItem('fit_redirect');window.location.href=rd;},1000);
          }
        }).catch(function(){});
      }else if(x.status==='expired'){
        clearInterval(qtp);qtp=null;clearInterval(qet);qet=null;
        s.textContent='\u4E8C\u7EF4\u7801\u5DF2\u8FC7\u671F';r.style.display='block';
      }
    }).catch(function(){});
  },2000);
}
function stT(){
  var e=document.getElementById('qrTimer'),s=document.getElementById('qrStatus'),r=document.getElementById('qrRefreshBtn');
  if(!e)return;
  if(qet)clearInterval(qet);
  qet=setInterval(function(){
    var rm=Math.max(0,Math.floor((qea-Date.now())/1000));
    if(rm<=0){clearInterval(qet);qet=null;e.textContent='';
      if(!r.style.display||r.style.display==='none'){s.textContent='\u4E8C\u7EF4\u7801\u5DF2\u8FC7\u671F';r.style.display='block';}
    }else{var m=Math.floor(rm/60),ss=rm%60;e.textContent='\u5269\u4F59 '+(m<10?'0':'')+m+':'+(ss<10?'0':'')+ss;}
  },1000);
}
function smS(){
  if(!qd)return;
  api.post('/auth/feishu/simulate-scan/'+qd.qrcode_id);
  api.post('/auth/feishu/confirm-scan/'+qd.qrcode_id).then(function(c){
    if(c.status==='confirmed'&&c.token){
      if(qtp){clearInterval(qtp);qtp=null;}
      if(qet){clearInterval(qet);qet=null;}
      localStorage.setItem('fit_token',c.token);localStorage.setItem('fit_user',JSON.stringify(c.user));
      shS('\u767B\u5F55\u6210\u529F','\u6B63\u5728\u8DF3\u8F6C...');
      setTimeout(function(){var rd=localStorage.getItem('fit_redirect')||'index.html';localStorage.removeItem('fit_redirect');window.location.href=rd;},1000);
    }
  }).catch(function(){});
}
document.addEventListener('DOMContentLoaded',function(){
  var lp=document.getElementById('panel-login');
  if(lp&&lp.classList.contains('active'))qrLd();
});

var qrPollTimer=null,qrExpTimer=null,qrExpAt=0,qrData=null;
function loadQRCode(){
  var img=document.getElementById('qrCodeImg'),ph=document.getElementById('qrPh'),st=document.getElementById('qrStatus'),rb=document.getElementById('qrRefreshBtn'),sb=document.getElementById('qrSimBtn');
  if(!img)return;
  img.style.display='none';ph.style.display='flex';st.textContent='’ΐ‘Ύ…ζ≥…...';
  rb.style.display='none';sb.style.display='none';
  if(qrPollTimer){clearInterval(qrPollTimer);qrPollTimer=null;}

var urlToken = new URLSearchParams(window.location.search).get('token');
if (urlToken) {
  localStorage.setItem('fit_token', urlToken);
  window.location.href = 'index.html';

// ====== Tab switching ======
function switchTab(tab) {
  document.querySelectorAll('.login-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.querySelectorAll('.login-panel').forEach(p => p.classList.toggle('active', p.id === 'panel-' + tab));
  document.querySelectorAll('.login-error').forEach(e => { e.classList.remove('show'); e.textContent = ''; });
}

// ====== Password toggle ======
function togglePwd(id, btn) {
  var i = document.getElementById(id);
  if (i.type === 'password') { i.type = 'text'; btn.textContent = '\u9690\u85CF'; }
  else { i.type = 'password'; btn.textContent = '\u663E\u793A'; }
}

// ====== Utility ======
function showError(id, msg) {
  var el = document.getElementById(id);
  el.textContent = msg;
  el.classList.add('show');
}
function clearErrors() {
  document.querySelectorAll('.login-error').forEach(e => { e.classList.remove('show'); e.textContent = ''; });
}
function setLoading(btnId, loading) {
  var btn = document.getElementById(btnId);
  if (loading) { btn.disabled = true; btn.innerHTML = '<span class="loading-spinner"></span>\u5904\u7406\u4E2D...'; }
  else { btn.disabled = false; btn.innerHTML = btnId === 'loginBtn' ? '\u767B\u5F55' : '\u6CE8\u518C'; }
}
function showSuccess(title, msg) {
  document.querySelectorAll('.login-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-success').classList.add('active');
  document.getElementById('successTitle').textContent = title;
  document.getElementById('successMsg').textContent = msg;
}

// ====== Check existing auth ======
async function checkAuth() {
  var token = localStorage.getItem('fit_token');
  if (!token) return;
  try {
    var r = await api.get('/check-auth');
    if (r.authed && r.user) {
      // Already logged in, redirect
      var redirect = localStorage.getItem('fit_redirect') || 'index.html';
      localStorage.removeItem('fit_redirect');
      window.location.href = redirect;
    } else {
      localStorage.removeItem('fit_token');
    }
  } catch(e) {}
}

// ====== Login ======
async function login() {
  clearErrors();
  var email = document.getElementById('loginEmail').value.trim();
  var pwd = document.getElementById('loginPassword').value;
  if (!email) { showError('loginEmailError', '\u8BF7\u8F93\u5165\u90AE\u7BB1\u6216\u624B\u673A\u53F7'); return; }
  if (!pwd) { showError('loginPwdError', '\u8BF7\u8F93\u5165\u5BC6\u7801'); return; }
  setLoading('loginBtn', true);
  try {
    var r = await api.post('/login', { email: email, password: pwd });
    if (r.success && r.token) {
      localStorage.setItem('fit_token', r.token);
      localStorage.setItem('fit_user', JSON.stringify(r.user));
      showSuccess('\u767B\u5F55\u6210\u529F', '\u6B63\u5728\u8DF3\u8F6C...');
      setTimeout(function() {
        var redirect = localStorage.getItem('fit_redirect') || 'index.html';
        localStorage.removeItem('fit_redirect');
        window.location.href = redirect;
      }, 1000);
    } else {
      showError('loginEmailError', r.error || '\u767B\u5F55\u5931\u8D25');
      setLoading('loginBtn', false);
    }
  } catch(e) {
    var msg = '\u767B\u5F55\u5931\u8D25';
    try { var err = JSON.parse(e.responseText); msg = err.error || msg; } catch(ex) {}
    showError('loginEmailError', msg);
    setLoading('loginBtn', false);
  }
}

// ====== Register ======
async function register() {
  clearErrors();
  var nick = document.getElementById('regNick').value.trim();
  var email = document.getElementById('regEmail').value.trim();
  var pwd = document.getElementById('regPwd').value;
  var pwd2 = document.getElementById('regPwd2').value;
  var ok = true;
  if (!email) { showError('regEmailError', '\u8BF7\u8F93\u5165\u90AE\u7BB1'); ok = false; }
  if (!pwd) { showError('regPwdError', '\u8BF7\u8F93\u5165\u5BC6\u7801'); ok = false; }
  else if (pwd.length < 8) { showError('regPwdError', '\u5BC6\u7801\u81F3\u5C11 8 \u4F4D'); ok = false; }
  else if (!/[a-zA-Z]/.test(pwd) || !/[0-9]/.test(pwd)) { showError('regPwdError', '\u5BC6\u7801\u5FC5\u987B\u5305\u542B\u5B57\u6BCD\u548C\u6570\u5B57'); ok = false; }
  if (pwd !== pwd2) { showError('regPwd2Error', '\u4E24\u6B21\u5BC6\u7801\u4E0D\u4E00\u81F4'); ok = false; }
  if (!document.getElementById('agreeTerms').checked) { showError('regPwd2Error', '\u8BF7\u540C\u610F\u7528\u6237\u534F\u8BAE'); ok = false; }
  if (!ok) return;
  setLoading('regBtn', true);
  try {
    var data = {
      email: email, password: pwd, nickname: nick || email.split('@')[0],
      height: parseFloat(document.getElementById('regHeight').value) || 170,
      weight: parseFloat(document.getElementById('regWeight').value) || 70,
      age: parseInt(document.getElementById('regAge').value) || 25,
      gender: document.getElementById('regGender').value,
      goal: document.getElementById('regGoal').value
    };
    var r = await api.post('/register', data);
    if (r.success && r.token) {
      localStorage.setItem('fit_token', r.token);
      localStorage.setItem('fit_user', JSON.stringify(r.user));
      showSuccess('\u6CE8\u518C\u6210\u529F', '\u6B22\u8FCE\u52A0\u5165\u94C1\u9986! \u6B63\u5728\u8DF3\u8F6C...');
      setTimeout(function() {
        window.location.href = 'profile.html';
      }, 1000);
    } else {
      showError('regEmailError', r.error || '\u6CE8\u518C\u5931\u8D25');
      setLoading('regBtn', false);
    }
  } catch(e) {
    var msg = '\u6CE8\u518C\u5931\u8D25';
    try { var err = JSON.parse(e.responseText); msg = err.error || msg; } catch(ex) {}
    showError('regEmailError', msg);
    setLoading('regBtn', false);
  }
}

      localStorage.setItem('fit_token', r.token);

      showSuccess('\u767B\u5F55\u6210\u529F', '\u6B63\u5728\u8DF3\u8F6C...');
      setTimeout(function() {
        var redirect = localStorage.getItem('fit_redirect') || 'index.html';
        localStorage.removeItem('fit_redirect');
        window.location.href = redirect;
      }, 1000);
    }
  } catch(e) {
    showError('loginEmailError', '\u767B\u5F55\u5931\u8D25\uFF0C\u8BF7\u7A0D\u540E\u518D\u8BD5');
  }
}

// Store redirect URL
(function() {
  var from = new URLSearchParams(window.location.search).get('from');
  if (from) localStorage.setItem('fit_redirect', from);
})();

checkAuth()
// QR code functions
var qt=null,qe=null,qa=0,qd=null;
function ql(){
  var i=document.getElementById('qrCodeImg'),p=document.getElementById('qrPh'),s=document.getElementById('qrStatus'),r=document.getElementById('qrRefreshBtn'),b=document.getElementById('qrSimBtn');
  if(!i)return;i.style.display='none';p.style.display='flex';s.textContent='\u6B63\u5728\u751F\u6210...';r.style.display='none';b.style.display='none';
  if(qt){clearInterval(qt);qt=null;}if(qe){clearInterval(qe);qe=null;}
  api.post('/auth/feishu/qrcode').then(function(x){
    qd=x;qa=x.expire_at;i.src=x.qrcode_url;
    i.onload=function(){i.style.display='block';p.style.display='none';};
    i.onerror=function(){p.textContent='\u52A0\u8F7D\u5931\u8D25';};
    s.textContent='\u8BF7\u4F7F\u7528\u98DE\u4E66\u626B\u7801\u767B\u5F55';b.style.display='inline-block';
    sp(x.qrcode_id);st();
  }).catch(function(){s.textContent='\u751F\u6210\u5931\u8D25';r.style.display='block';});
}
function sp(id){
  var s=document.getElementById('qrStatus'),r=document.getElementById('qrRefreshBtn');
  if(qt)clearInterval(qt);
  qt=setInterval(function(){
    api.get('/feishu/status/'+id).then(function(x){
      if(x.status==='scanned'){
        s.textContent='\u5DF2\u626B\u7801\uFF0C\u8BF7\u5728\u624B\u673A\u4E0A\u786E\u8BA4';
        api.post('/auth/feishu/confirm-scan/'+id).then(function(c){
          if(c.status==='confirmed'&&c.token){
            clearInterval(qt);qt=null;clearInterval(qe);qe=null;
            localStorage.setItem('fit_token',c.token);localStorage.setItem('fit_user',JSON.stringify(c.user));
            showSuccess('\u767B\u5F55\u6210\u529F','\u6B63\u5728\u8DF3\u8F6C...');
            setTimeout(function(){var rd=localStorage.getItem('fit_redirect')||'index.html';localStorage.removeItem('fit_redirect');window.location.href=rd;},1000);
          }
        }).catch(function(){});
      }else if(x.status==='expired'){
        clearInterval(qt);qt=null;clearInterval(qe);qe=null;
        s.textContent='\u4E8C\u7EF4\u7801\u5DF2\u8FC7\u671F';r.style.display='block';
      }
    }).catch(function(){});
  },2000);
}
function st(){
  var e=document.getElementById('qrTimer'),s=document.getElementById('qrStatus'),r=document.getElementById('qrRefreshBtn');
  if(!e)return;if(qe)clearInterval(qe);
  qe=setInterval(function(){
    var rm=Math.max(0,Math.floor((qa-Date.now())/1000));
    if(rm<=0){clearInterval(qe);qe=null;e.textContent='';
    if(!r.style.display||r.style.display==='none'){s.textContent='\u4E8C\u7EF4\u7801\u5DF2\u8FC7\u671F';r.style.display='block';}
    }else{var m=Math.floor(rm/60),ss=rm%60;e.textContent='\u5269\u4F59 '+(m<10?'0':'')+m+':'+(ss<10?'0':'')+ss;}
  },1000);
}
function ss(){
  if(!qd)return;
  api.post('/auth/feishu/simulate-scan/'+qd.qrcode_id);
  api.post('/auth/feishu/confirm-scan/'+qd.qrcode_id).then(function(c){
    if(c.status==='confirmed'&&c.token){
      if(qt){clearInterval(qt);qt=null;}if(qe){clearInterval(qe);qe=null;}
      localStorage.setItem('fit_token',c.token);localStorage.setItem('fit_user',JSON.stringify(c.user));
      showSuccess('\u767B\u5F55\u6210\u529F','\u6B63\u5728\u8DF3\u8F6C...');
      setTimeout(function(){var rd=localStorage.getItem('fit_redirect')||'index.html';localStorage.removeItem('fit_redirect');window.location.href=rd;},1000);
    }
  }).catch(function(){});
}
document.addEventListener('DOMContentLoaded',function(){
  var lp=document.getElementById('panel-login');
  if(lp&&lp.classList.contains('active'))ql();
});
