<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>健身工具 - 铁馆</title>
<meta name="description" content="铁馆健身工具 - 1RM最大重量计算器、体脂率估算工具，辅助科学训练。">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<script>
(function(){var p=location.pathname.split("/").pop()||"index.html";document.querySelectorAll(".nav-links a").forEach(function(a){if(a.getAttribute("href")===p)a.classList.add("active")})})();
</script>
<script src="js/particles.js""></script>
<div class="container content-enter">
  <h1 class="page-title content-enter">健身工具</h1>
  <p class="page-subtitle content-enter content-enter-delay-1">1RM计算器 + 体脂率估算</p>

  <div class="tools-layout content-enter content-enter-delay-2">
    <div class="tool-card">
      <h3>??? 1RM 计算器</h3>
      <p style="font-size:13px;color:var(--text-tertiary);margin-bottom:12px;">输入你能做的最大重量和次数，估算你的1RM（一次最大重量）</p>
      <div class="rm-input-group">
        <div class="form-group" style="flex:1;min-width:100px;"><label>重量 (kg)</label><input class="form-control" id="rmWeight" type="number" step="2.5" value="60"></div>
        <div class="form-group" style="flex:1;min-width:80px;"><label>完成次数</label><input class="form-control" id="rmReps" type="number" min="1" max="30" value="8"></div>
        <div class="form-group"><label>&nbsp;</label><button class="btn btn-primary" onclick="calcRM()">计算</button></div>
      </div>
      <div class="rm-result" id="rmResult">— kg</div>
      <div style="font-size:12px;color:var(--text-tertiary);" id="rmDetails"></div>
    </div>

    <div class="tool-card">
      <h3>?? 体脂率估算</h3>
      <p style="font-size:13px;color:var(--text-tertiary);margin-bottom:12px;">基于腰围和身高的简易估算公式</p>
      <div class="rm-input-group">
        <div class="form-group" style="flex:1;"><label>性别</label><select class="form-control" id="bfGender"><option value="男">男</option><option value="女">女</option></select></div>
        <div class="form-group" style="flex:1;"><label>腰围 (cm)</label><input class="form-control" id="bfWaist" type="number" step="0.5" value="80"></div>
        <div class="form-group" style="flex:1;"><label>身高 (cm)</label><input class="form-control" id="bfHeight" type="number" step="0.5" value="175"></div>
        <div class="form-group" style="flex:1;"><label>体重 (kg)</label><input class="form-control" id="bfWeight" type="number" step="0.1" value="75"></div>
        <div class="form-group"><label>&nbsp;</label><button class="btn btn-primary" onclick="calcBF()">计算</button></div>
      </div>
      <div class="rm-result" id="bfResult">— %</div>
      <div class="bf-info" id="bfInfo"></div>
      <h4 style="font-size:14px;font-weight:600;margin:14px 0 8px;">体脂率参考表</h4>
      <table class="bf-table"><tr><th>男性</th><th>女性</th><th>体型描述</th></tr>
        <tr><td>6-13%</td><td>14-20%</td><td>精英运动员</td></tr>
        <tr><td>14-17%</td><td>21-24%</td><td>健身达人</td></tr>
        <tr><td>18-24%</td><td>25-31%</td><td>健康范围</td></tr>
        <tr><td>25%+</td><td>32%+</td><td>超重范围</td></tr>
      </table>
    </div>
  </div>
</div>
<script src="js/effects.js""></script>
<script src="js/unlock.js""></script>
<script src="js/nav.js""></script>
<script src="js/ui.js""></script>
<script>
function calcRM() {
  const weight = parseFloat(document.getElementById('rmWeight').value) || 0;
  const reps = parseInt(document.getElementById('rmReps').value) || 1;
  if (weight <= 0 || reps <= 0) { document.getElementById('rmResult').textContent = '输入无效'; return; }
  let rm = reps < 11 ? weight * (36 / (37 - reps)) : weight * (1 + reps / 30);
  rm = Math.round(rm * 10) / 10;
  document.getElementById('rmResult').textContent = rm + ' kg';
  const pcts = [100, 95, 90, 85, 80, 75, 70, 65, 60];
  const repNums = [1, 2, 4, 6, 8, 10, 12, 15, 20];
  let details = '<table class="bf-table"><tr><th>次数</th>';
  for (const r of repNums) details += '<th>' + r + 'RM</th>';
  details += '</tr><tr><th>重量(kg)</th>';
  for (const p of pcts) details += '<td>' + Math.round(rm * p / 100 * 10) / 10 + '</td>';
  details += '</tr></table>';
  document.getElementById('rmDetails').innerHTML = details;
}
function calcBF() {
  const gender = document.getElementById('bfGender').value;
  const waist = parseFloat(document.getElementById('bfWaist').value) || 0;
  const height = parseFloat(document.getElementById('bfHeight').value) || 0;
  const weight = parseFloat(document.getElementById('bfWeight').value) || 0;
  if (!waist || !height || !weight) { document.getElementById('bfResult').textContent = '输入无效'; return; }
  let bf = gender === '男' ? 86.010 * Math.log10(waist) - 70.041 * Math.log10(height) + 36.76 : 163.205 * Math.log10(waist) - 97.684 * Math.log10(height) - 104.912;
  bf = Math.round(Math.max(3, Math.min(50, bf)) * 10) / 10;
  document.getElementById('bfResult').textContent = bf + '%';
  let desc = '';
  if (gender === '男') desc = bf <= 13 ? '精英运动员水平' : bf <= 17 ? '健身达人水平' : bf <= 24 ? '健康范围' : '超重范围，建议增加运动';
  else desc = bf <= 20 ? '精英运动员水平' : bf <= 24 ? '健身达人水平' : bf <= 31 ? '健康范围' : '超重范围，建议增加运动';
  const fatMass = Math.round(weight * bf / 100 * 10) / 10;
  const leanMass = Math.round((weight - fatMass) * 10) / 10;
  document.getElementById('bfInfo').innerHTML = '评估: ' + desc + '<br>脂肪重量: ' + fatMass + 'kg · 瘦体重: ' + leanMass + 'kg';
}
calcRM();
</script>

    <script src="js/utils.js"></script>
    <script src="js/toast.js"></script>
</body>
</html>
