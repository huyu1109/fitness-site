.view-tabs{display:flex;gap:0;margin-bottom:8px;justify-content:center}
.view-tab{padding:6px 20px;border:1px solid rgba(255,255,255,0.12);background:transparent;color:rgba(255,255,255,0.6);cursor:pointer;font-size:13px;transition:all 0.2s}
.view-tab:first-child{border-radius:6px 0 0 6px}
.view-tab:last-child{border-radius:0 6px 6px 0}
.view-tab.active{background:rgba(100,180,246,0.12);color:#64b5f6;border-color:#64b5f6}
.muscle-pure-svg{width:800px;height:auto;display:block}

</style>

<script>
var sel=new Set(),cv=0;
document.querySelectorAll(".muscle-part").forEach(function(e){
  e.addEventListener("click",function(){
    var n=this.getAttribute("data-name");
    if(sel.has(n)){sel.delete(n);this.classList.remove("selected")}
    else{sel.add(n);this.classList.add("selected")}
  })
})
function switchView(v){
  cv=v
  document.querySelectorAll(".muscle-pure-svg").forEach(function(s,i){s.style.display=i===v?"block":"none"})
  document.querySelectorAll(".view-tab").forEach(function(e,i){e.classList.toggle("active",i===v)})
}
</script>
